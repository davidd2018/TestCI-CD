# CD for python application
# This workflow will run after the successful completion of the "Python application" workflow.
# For more information see: https://docs.github.com/en/actions/automating-builds-and
name: CD Pipeline

on:
  workflow_run:
    workflows: ["Python application"]
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Run application
        run: python test/sum.py